<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="icon" href="/assets/tourism.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="flex flex-col items-center justify-center h-screen bg-gray-100">
        <div class="w-full max-w-md p-8 bg-white rounded shadow">
            <h2 class="text-2xl font-bold mb-6 text-center">Log In</h2>
            <form id="logindataform" class="space-y-4">
                <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" required class="w-full px-3 py-2 border rounded">
                </div>
                <div>
                 <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded">
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
                    Log In
                </button>
                <p class="text-sm text-center text-gray-600 mt-4">
                    Don't have an account? <a href="signup.html" class="text-green-500 hover:text-green-600">Sign up</a></p>
            </form>
        </div>
        <script>
            let logindataform=document.getElementById("logindataform");
            
            logindataform.addEventListener("submit",async (e)=>{
                e.preventDefault();
                let username=document.getElementById("username").value;
                let password=document.getElementById("password").value;
                let response=await axios.get("https://tourism-api-5tpw.onrender.com/signup");
                let users=response.data;
                let user=users.some(u=>u.username===username && u.password===password);
                if(user){
    alert("Login successful!");
       localStorage.setItem("isLoggedIn", true);
    localStorage.setItem("username", username);
    window.location.href="index.html";
} else {
                    alert("Invalid username or password.");
                }
            });
        </script>
</body>
</html>
