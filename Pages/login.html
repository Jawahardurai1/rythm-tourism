<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="icon" href="/assets/tourism.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../assets/theme.js"></script>
    <style>
    #bg-video {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
    }
     .theme-card {
        background: transparent !important;
    }
</style>
</head>
<body>
    <nav class="theme-nav bg-gradient-to-r from-green-600 to-green-900 text-white p-2 flex justify-between items-center shadow-lg">

        <h1 class="text-2xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-earth-asia"></i>
            Rythm Tourism
        </h1>

        <button onclick="history.back()"
            class="bg-orange-500 hover:bg-orange-700 px-4 py-2 rounded-xl transition duration-300">
            Back
        </button>
    </nav>
     <video id="bg-video" autoplay muted loop playsinline>
        <source src="../assets/clip.mp4" type="video/mp4">
    </video>
    <div class="fixed inset-0 bg-black/40" style="z-index: 0;"></div>

    <div class="theme-card relative flex flex-col items-center justify-center h-screen" style="z-index: 1;">
        <div class="w-full max-w-md p-8 bg-black/30 backdrop-blur-md rounded shadow border border-white/20">
            <h2 class="text-2xl font-bold mb-6 text-center  text-white/80">Log In</h2>
            <form id="logindataform" class="space-y-4">
                <div>
            <label for="username" class="block text-sm font-medium text-gray-700  text-white/80">Username</label>
                <input type="text" id="username" name="username" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <div>
                 <label for="password" class="block text-sm font-medium  text-white/80">Password</label>
                    <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded  text-white/80">
                    Log In
                </button>
                <p class="text-sm text-center  text-white/80 mt-4">
                    Don't have an account? <a href="signup.html" class="text-green-500 hover:text-green-600">Sign up</a></p>
            </form>
        </div>
        <script>
            let logindataform=document.getElementById("logindataform");
            
            logindataform.addEventListener("submit",async (e)=>{
                e.preventDefault();
                let username=document.getElementById("username").value;
                let password=document.getElementById("password").value;
                let response=await axios.get("https://tourism-api-5tpw.onrender.com/signup");
                let users=response.data;
                let user=users.some(u=>u.username===username && u.password===password);
                if(user){
    alert("Login successful!");
       localStorage.setItem("isLoggedIn", true);
    localStorage.setItem("username", username);
    window.location.href="index.html";
} else {
                    alert("Invalid username or password.");
                }
            });
        </script>
</body>
</html>
