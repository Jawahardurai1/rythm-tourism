<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Rythm Tourism</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="/assets/tourism.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/Styles/main.css">
    <script src="/Scripts/utils.js"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex items-center justify-center page-wrapper">
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-gray-100 animate-scale-in mx-4">
        <div class="text-center mb-8">
            <img src="/assets/logo2.png" class="h-16 mx-auto mb-3" alt="Rythm Tourism">
            <h2 class="text-2xl font-extrabold text-gray-800" style="font-family: 'Montserrat', sans-serif;">Create Account</h2>
            <p class="text-gray-500 text-sm mt-1">Start your travel adventure today</p>
        </div>
        <form id="signupdataform" class="space-y-5">
            <div class="animate-fade-in-up delay-100">
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-user text-green-600"></i> Username
                </label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="username" name="username" required placeholder="Choose a username"
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 focus:border-green-400 outline-none transition-all duration-300 bg-gray-50/50">
                </div>
            </div>
            <div class="animate-fade-in-up delay-200">
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-envelope text-green-600"></i> Email
                </label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="email" name="email" required placeholder="Enter your email"
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 focus:border-green-400 outline-none transition-all duration-300 bg-gray-50/50">
                </div>
            </div>
            <div class="animate-fade-in-up delay-300">
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-lock text-green-600"></i> Password
                </label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" name="password" required placeholder="Create a password"
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 focus:border-green-400 outline-none transition-all duration-300 bg-gray-50/50">
                </div>
            </div>
            <div class="animate-fade-in-up delay-400">
                <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                    <i class="fa-solid fa-shield text-green-600"></i> Confirm Password
                </label>
                <div class="relative">
                    <i class="fa-solid fa-shield absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password"
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-400 focus:border-green-400 outline-none transition-all duration-300 bg-gray-50/50">
                </div>
            </div>
            <button type="submit" class="w-full btn-primary py-3 text-base animate-fade-in-up delay-500">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </button>
        </form>
        <p class="text-sm text-center text-gray-500 mt-6 animate-fade-in-up delay-600">
            Already have an account?
            <a href="/Pages/login.html" class="text-green-600 hover:text-green-700 font-semibold hover:underline transition-all duration-300">
                <i class="fa-solid fa-right-to-bracket"></i> Log in
            </a>
        </p>
        <div class="text-center mt-6 animate-fade-in-up delay-700">
            <a href="/" class="text-sm text-gray-400 hover:text-green-600 transition-colors duration-300">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
    <script>
        let signupdataform = document.getElementById("signupdataform");
        signupdataform.addEventListener("submit", async (e) => {
            e.preventDefault();
            let username = document.getElementById("username").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirm-password").value;

            if (!username || !email || !password || !confirmPassword) {
                showToast('warning', 'Please fill in all fields');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Invalid Email',
                    text: 'Please enter a valid email address.',
                    confirmButtonColor: '#16a34a'
                });
                return;
            }

            if (password.length < 6) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Weak Password',
                    text: 'Password must be at least 6 characters.',
                    confirmButtonColor: '#16a34a'
                });
                return;
            }

            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Passwords do not match!',
                    text: 'Please make sure both passwords match.',
                    confirmButtonColor: '#16a34a',
                    confirmButtonText: 'Try Again'
                });
                return;
            }

            const userData = { username, email, password };
            try {
                const response = await axios.post("https://tourism-api-5tpw.onrender.com/signup", userData);
                showToast('success', 'Signup successful!');
                localStorage.setItem("isLoggedIn", true);
                localStorage.setItem("username", username);
                setTimeout(() => {
                    window.location.href = "/";
                }, 1000);
            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Signup Failed',
                    text: error.response?.data?.message || 'Please try again.',
                    confirmButtonColor: '#16a34a'
                });
            }
        });
    </script>
</body>
</html>
