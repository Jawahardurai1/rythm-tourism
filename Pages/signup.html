<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="assets/tourism.png" type="image/x-icon">
    <script src="../assets/theme.js"></script>
       <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
    #bg-video {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
    }
     .theme-card {
        background: transparent !important;
    }
    </style>
</head>
<body>
    <!-- <nav class="theme-nav bg-gradient-to-r from-green-600 to-green-900 text-white p-2 flex justify-between items-center shadow-lg"> -->

        <!-- <h1 class="text-2xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-earth-asia"></i>
            Rythm Tourism
        </h1>

        <button onclick="history.back()"
            class="bg-orange-500 hover:bg-orange-700 px-4 py-2 rounded-xl transition duration-300">
            Back
        </button> -->
        <div id="header-container" class="relative z-50"></div>
        <video id="bg-video" autoplay muted loop playsinline>
        <source src="../assets/covervid.mp4" type="video/mp4">
    </video>
    <div class="fixed inset-0 bg-black/40" style="z-index: 0;"></div>
    <!-- </nav> -->
<div class="theme-card relative flex flex-col items-center justify-center h-screen" style="z-index: 1;">
        <div class="w-full max-w-md p-8 rounded shadow bg-black/30 backdrop-blur-md border-white/20">
            <h2 class="text-2xl font-bold mb-6 text-center text-white/80">Sign Up</h2>
            <form id="signupdataform" class="space-y-4">
                <div>
            <label for="username" class="block text-sm font-medium  text-white/80">Username</label>
                <input type="text" id="username" name="username" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <div>
                 <label for="email" class="block text-sm font-medium  text-white/80">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <div>
                <label for="password" class="block text-sm font-medium  text-white/80">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <div>
                <label for="confirm-password" class="block text-sm font-medium  text-white/80">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required class="w-full px-3 py-2 border rounded  text-white/80">
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">
                    Sign Up
                </button>
                <p class="text-sm text-center text-gray-600 mt-4">
                    Already have an account? <a href="../Pages/login.html" class="text-green-500 hover:text-green-600">Log in</a></p>
            </form>
            </form>
        </div>
    </div>
     <script src="../Layout/Header.js"></script>
    <script>
         fetch("../Layout/Header.html")
.then(res => res.text())
.then(data => {
   document.getElementById("header-container").innerHTML = data;
   setupHeader();
})
       let signupdataform=document.getElementById("signupdataform");
       signupdataform.addEventListener("submit",async (e)=>{
        e.preventDefault();
        let username=document.getElementById("username").value;
        let email=document.getElementById("email").value;
        let password=document.getElementById("password").value;
        let confirmPassword=document.getElementById("confirm-password").value;
        if(password!==confirmPassword){
            alert("Passwords do not match!");
            
            return;
        }
       
            const userData = {
    username: username,
    email: email,
    password: password
};
try {
const response=await axios.post("https://tourism-api-5tpw.onrender.com/signup",userData);
console.log(response.data);
localStorage.setItem("isLoggedIn", true);
    localStorage.setItem("username", username);
      await Swal.fire({
                                icon: 'success',
                                title: 'Sign up Successful!',
                                text: 'Get ready for your adventure',
                                confirmButtonText: 'OK',
                                timer: 10000,
                            });
    window.location.href="../index.html";


    } catch (error) {
        console.error(error);
        alert("Signup failed. Please try again.");
    }
       });

    </script>
</body>
</html>
